version: '3.8'

services:
  lumicatech:
    build: .
    container_name: lumicatech
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SKIP_MIGRATIONS=false
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
  postgres:
    image: postgres:15-alpine
    container_name: lumicatech_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=lumicatechdb
      - POSTGRES_USER=Jose
      - POSTGRES_PASSWORD=xPR1wjfW31hFs6OdbaYm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Jose"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
